---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-sre

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-sre-engine
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-sre-engine
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-sre-engine
subjects:
  - kind: ServiceAccount
    name: default
    namespace: ai-sre

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sre-engine
  namespace: ai-sre
  labels:
    app: ai-sre-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-sre-engine
  template:
    metadata:
      labels:
        app: ai-sre-engine
    spec:
      containers:
        - name: engine
          image: tunnetcom/ai-sre-engine:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_URL
              value: "http://192.168.1.30:11434/api/generate"
            - name: OLLAMA_MODEL
              value: "llama3.1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: POLL_INTERVAL
              value: "5"
            - name: WINDOW_SECONDS
              value: "30"
            - name: METRICS_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: ai-sre-engine
  namespace: ai-sre
  labels:
    app: ai-sre-engine
spec:
  ports:
    - port: 8080
      name: metrics
      targetPort: 8080
  selector:
    app: ai-sre-engine

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-sre-engine
  namespace: monitoring
  labels:
    app: ai-sre-engine
    release: prometheus
spec:
  selector:
    matchLabels:
      app: ai-sre-engine
  namespaceSelector:
    matchNames:
      - ai-sre
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
